site_name: DocsUpdater - Technical Documentation
site_description: Auto-updating technical documentation powered by n8n + Claude
site_url: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true
  - awesome-pages

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview:
      - overview/index.md
      - Getting Started: overview/getting-started.md
  - Architecture:
      - architecture/index.md
      - System Design: architecture/system-design.md
      - Tech Stack: architecture/tech-stack.md
  - API Reference:
      - api-reference/index.md
      - Endpoints: api-reference/endpoints.md
  - Business Requirements:
      - business-requirements/index.md
      - User Stories: business-requirements/user-stories.md
  - Sprint Changelog:
      - sprint-changelog/index.md
  - Projects:
      - Prospects: projects/prospects.md
  - Runbooks:
      - runbooks/index.md
      - Deployment: runbooks/deployment.md
